<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>RH Top-Up Store</title>
    <style>
        /* CSS: আধুনিক এবং প্রফেশনাল ডিজাইন */
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .section-title { font-size: 24px; color: #f97316; margin: 30px 0 15px; border-left: 5px solid #f97316; padding-left: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        
        .card { background: #1e293b; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #334155; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #f97316; }
        
        .offer-card { border: 2px solid #ef4444; background: #450a0a; }
        .stock-out { opacity: 0.5; filter: grayscale(1); }
        
        button { background: #f97316; color: white; border: none; padding: 10px 20px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:#f97316;">RH Top-Up</h1>
    <input type="text" id="uid" placeholder="আপনার গেম UID এখানে লিখুন">

    <div class="section-title">ডায়মন্ড প্যাকেজসমূহ</div>
    <div id="diamond-list" class="grid"></div>

    <div class="section-title">শুক্রবার বিশেষ অফার</div>
    <div id="friday-list" class="grid"></div>
</div>

<script>
    // জাভাস্ক্রিপ্ট: প্যাকেজের তথ্য ও ডাটাবেজ লজিক
    const diamonds = [
        { name: "115 D", price: 79, stock: true }, { name: "355 D", price: 237, stock: true },
        { name: "610 D", price: 400, stock: true }, { name: "1240 D", price: 800, stock: true },
        { name: "2530 D", price: 1610, stock: true }, { name: "10020 D", price: 6440, stock: true }
    ];

    const fridayOffers = [
        { name: "Weekly+Monthly", price: 750, stock: true },
        { name: "3060 Diamond", price: 700, stock: true },
        { name: "12020 Diamond", price: 2999, stock: true }
    ];

    function loadItems(items, containerId, isOffer = false) {
        const container = document.getElementById(containerId);
        items.forEach(item => {
            container.innerHTML += `
                <div class="card ${!item.stock ? 'stock-out' : ''} ${isOffer ? 'offer-card' : ''}">
                    <h3>${item.name}</h3>
                    <p style="font-size: 18px; color:#f97316;">৳ ${item.price}</p>
                    <button ${!item.stock ? 'disabled' : ''}>
                        ${item.stock ? 'অর্ডার করুন' : 'STOCK OUT'}
                    </button>
                </div>
            `;
        });
    }

    loadItems(diamonds, 'diamond-list');
    loadItems(fridayOffers, 'friday-list', true);
</script>
